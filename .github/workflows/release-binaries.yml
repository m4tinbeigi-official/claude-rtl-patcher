name: Build standalone binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: node20-linux-x64
            asset: claude-rtl-patcher-linux-x64
          - runner: macos-13
            target: node20-macos-x64
            asset: claude-rtl-patcher-macos-x64
          - runner: macos-14
            target: node20-macos-arm64
            asset: claude-rtl-patcher-macos-arm64
          - runner: windows-latest
            target: node20-win-x64
            asset: claude-rtl-patcher-windows-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build executable
        run: npx --yes @yao-pkg/pkg@6.21.0 . --target ${{ matrix.target }} --public-packages '*' --output dist/${{ matrix.asset }}
      - name: Upload release asset
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ matrix.asset }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
